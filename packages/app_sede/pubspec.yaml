name: app_sede
description: Aplicación de generación de código QR dinámico para asistencia en tiendas/sedes.
publish_to: none

version: 1.0.0+1

environment:
  sdk: '>=2.19.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core package
  asistencia_core:
    path: ../core
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0
  
  # QR Generation
  qr_flutter: ^4.0.0
  
  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  provider: ^6.1.0
  
  # UI
  flutter_svg: ^2.0.0
  cupertino_icons: ^1.0.2
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
